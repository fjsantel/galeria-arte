<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Administración | Galería de Arte</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- NAVBAR -->
    <nav class="navbar">
        <a href="index.html" class="navbar-logo">GALERÍA</a>
        <button class="mobile-menu-toggle" id="mobile-menu-toggle">☰</button>
        <ul class="navbar-menu" id="navbar-menu">
            <button class="mobile-menu-close" id="mobile-menu-close">✕</button>
            <li><a href="obras.html">OBRAS</a></li>
            <li><a href="index.html#galeria">GALERÍA</a></li>
            <li><a href="index.html#contacto">CONTACTO</a></li>
        </ul>
        <a href="admin.html" class="cart-btn" style="text-decoration: none;">
            ADMIN
        </a>
    </nav>
    <div class="menu-overlay" id="menu-overlay"></div>

    <!-- LOGIN -->
    <div class="login-container" id="login-container">
        <h1>Administración</h1>
        <form class="login-form" id="login-form">
            <input type="password" id="password-input" placeholder="Contraseña" required>
            <button type="submit">INGRESAR</button>
        </form>
    </div>

    <!-- ADMIN PANEL -->
    <div class="admin-container" id="admin-panel" style="display: none;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
            <h1 style="font-size: 3rem;">Panel de Administración</h1>
            <button class="logout-btn" onclick="logout()">CERRAR SESIÓN</button>
        </div>

        <!-- AGREGAR OBRA -->
        <div class="admin-section">
            <h2>Agregar Nueva Obra</h2>
            <form id="add-artwork-form">
                <div class="form-group">
                    <label for="titulo">Título</label>
                    <input type="text" id="titulo" required>
                </div>

                <div class="form-group">
                    <label for="artista">Artista</label>
                    <input type="text" id="artista" required>
                </div>

                <div class="form-group">
                    <label for="anio">Año</label>
                    <input type="number" id="anio" min="1900" max="2100" required>
                </div>

                <div class="form-group">
                    <label for="tecnica">Técnica</label>
                    <input type="text" id="tecnica" placeholder="Ej: Óleo sobre tela" required>
                </div>

                <div class="form-group">
                    <label for="precio">Precio (CLP)</label>
                    <input type="text" inputmode="numeric" pattern="[0-9]*" id="precio" placeholder="Ej: 1000000" required>
                </div>

                <div class="form-group">
                    <label for="imagenes">Imágenes (puedes seleccionar múltiples)</label>
                    <input type="file" id="imagenes" accept="image/*" multiple required>
                    <small style="color: #666; display: block; margin-top: 0.5rem;">
                        La primera imagen será la principal. Puedes seleccionar hasta 10 imágenes.
                    </small>
                </div>

                <div class="form-group">
                    <label>
                        <input type="checkbox" id="disponible" checked>
                        Disponible para venta
                    </label>
                </div>

                <button type="submit" class="submit-btn">AGREGAR OBRA</button>
            </form>
        </div>

        <!-- LISTA DE OBRAS -->
        <div class="admin-section">
            <h2>Obras Registradas</h2>
            <div id="obras-list"></div>
        </div>
    </div>

    <!-- MODAL DE EDICIÓN -->
    <div class="modal-overlay" id="edit-modal-overlay">
        <div class="modal-content">
            <h2>Editar Obra</h2>
            <form id="edit-artwork-form">
                <input type="hidden" id="edit-id">

                <div class="form-group">
                    <label for="edit-titulo">Título</label>
                    <input type="text" id="edit-titulo" required>
                </div>

                <div class="form-group">
                    <label for="edit-artista">Artista</label>
                    <input type="text" id="edit-artista" required>
                </div>

                <div class="form-group">
                    <label for="edit-anio">Año</label>
                    <input type="number" id="edit-anio" min="1900" max="2100" required>
                </div>

                <div class="form-group">
                    <label for="edit-tecnica">Técnica</label>
                    <input type="text" id="edit-tecnica" required>
                </div>

                <div class="form-group">
                    <label for="edit-precio">Precio (CLP)</label>
                    <input type="text" inputmode="numeric" pattern="[0-9]*" id="edit-precio" required>
                </div>

                <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                    <button type="submit" class="submit-btn">GUARDAR CAMBIOS</button>
                    <button type="button" class="submit-btn" onclick="closeEditModal()" style="background-color: #999;">CANCELAR</button>
                </div>
            </form>
        </div>
    </div>

    <!-- SCRIPTS -->
    <script src="config.js"></script>
    <script>
        // GESTIÓN DE SESIÓN
        function checkAuth() {
            const isAuthenticated = sessionStorage.getItem('adminAuth') === 'true';
            if (isAuthenticated) {
                showAdminPanel();
            }
        }

        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const password = document.getElementById('password-input').value;

            if (password === ADMIN_PASSWORD) {
                sessionStorage.setItem('adminAuth', 'true');
                showAdminPanel();
            } else {
                alert('Contraseña incorrecta');
            }
        });

        function showAdminPanel() {
            document.getElementById('login-container').style.display = 'none';
            document.getElementById('admin-panel').style.display = 'block';
            loadObras();
        }

        function logout() {
            sessionStorage.removeItem('adminAuth');
            location.reload();
        }

        // SUBIR IMAGEN A SUPABASE STORAGE
        async function uploadImage(file) {
            const fileName = `${Date.now()}-${file.name.replace(/[^a-zA-Z0-9.-]/g, '_')}`;

            try {
                const response = await fetch(`${SUPABASE_URL}/storage/v1/object/${STORAGE_BUCKET}/${fileName}`, {
                    method: 'POST',
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`,
                        'Content-Type': file.type
                    },
                    body: file
                });

                if (!response.ok) {
                    const errorData = await response.text();
                    console.error('Error response:', errorData);
                    throw new Error(`Error al subir la imagen: ${errorData}`);
                }

                // Retornar URL pública
                return `${SUPABASE_URL}/storage/v1/object/public/${STORAGE_BUCKET}/${fileName}`;
            } catch (error) {
                console.error('Error:', error);
                throw error;
            }
        }

        // AGREGAR OBRA
        document.getElementById('add-artwork-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const submitBtn = e.target.querySelector('.submit-btn');
            submitBtn.disabled = true;
            submitBtn.textContent = 'SUBIENDO...';

            try {
                const imageFiles = document.getElementById('imagenes').files;

                if (imageFiles.length === 0) {
                    throw new Error('Debes seleccionar al menos una imagen');
                }

                if (imageFiles.length > 10) {
                    throw new Error('Máximo 10 imágenes por obra');
                }

                // Subir todas las imágenes
                submitBtn.textContent = `SUBIENDO IMÁGENES (0/${imageFiles.length})...`;
                const imageUrls = [];

                for (let i = 0; i < imageFiles.length; i++) {
                    const url = await uploadImage(imageFiles[i]);
                    imageUrls.push(url);
                    submitBtn.textContent = `SUBIENDO IMÁGENES (${i + 1}/${imageFiles.length})...`;
                }

                submitBtn.textContent = 'GUARDANDO OBRA...';

                // Crear obra en la base de datos (usando la primera imagen como principal)
                const obra = {
                    titulo: document.getElementById('titulo').value,
                    artista: document.getElementById('artista').value,
                    anio: parseInt(document.getElementById('anio').value),
                    tecnica: document.getElementById('tecnica').value,
                    precio: parseFloat(document.getElementById('precio').value),
                    imagen_url: imageUrls[0], // Primera imagen como principal
                    disponible: document.getElementById('disponible').checked
                };

                const response = await fetch(`${SUPABASE_URL}/rest/v1/obras`, {
                    method: 'POST',
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`,
                        'Content-Type': 'application/json',
                        'Prefer': 'return=representation'
                    },
                    body: JSON.stringify(obra)
                });

                if (!response.ok) {
                    throw new Error('Error al guardar la obra');
                }

                const [obraCreada] = await response.json();

                // Guardar todas las imágenes en la tabla obra_imagenes
                for (let i = 0; i < imageUrls.length; i++) {
                    await fetch(`${SUPABASE_URL}/rest/v1/obra_imagenes`, {
                        method: 'POST',
                        headers: {
                            'apikey': SUPABASE_KEY,
                            'Authorization': `Bearer ${SUPABASE_KEY}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            obra_id: obraCreada.id,
                            imagen_url: imageUrls[i],
                            orden: i,
                            es_principal: i === 0
                        })
                    });
                }

                alert('Obra agregada exitosamente con ' + imageUrls.length + ' imagen(es)');
                e.target.reset();
                loadObras();

            } catch (error) {
                console.error('Error:', error);
                alert('Error al agregar la obra: ' + error.message);
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'AGREGAR OBRA';
            }
        });

        // CARGAR LISTA DE OBRAS
        async function loadObras() {
            const container = document.getElementById('obras-list');
            container.innerHTML = '<p class="loading">Cargando obras...</p>';

            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/obras?select=*&order=created_at.desc`, {
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`
                    }
                });

                if (!response.ok) {
                    throw new Error('Error al cargar las obras');
                }

                const obras = await response.json();

                if (obras.length === 0) {
                    container.innerHTML = '<p style="text-align: center; color: #999;">No hay obras registradas.</p>';
                    return;
                }

                container.innerHTML = `
                    <table class="obras-table">
                        <thead>
                            <tr>
                                <th>Imagen</th>
                                <th>Título</th>
                                <th>Artista</th>
                                <th>Año</th>
                                <th>Precio</th>
                                <th>Estado</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${obras.map(obra => `
                                <tr>
                                    <td><img src="${obra.imagen_url}" alt="${obra.titulo}"></td>
                                    <td>${obra.titulo}</td>
                                    <td>${obra.artista}</td>
                                    <td>${obra.anio}</td>
                                    <td>$${formatPrice(obra.precio)}</td>
                                    <td>${obra.disponible ? '✓ Disponible' : '✕ Vendida'}</td>
                                    <td>
                                        <button class="table-btn" onclick="editObra('${obra.id}')">
                                            Editar
                                        </button>
                                        <button class="table-btn ${obra.disponible ? '' : 'sold'}"
                                                onclick="toggleDisponibilidad('${obra.id}', ${!obra.disponible})">
                                            ${obra.disponible ? 'Marcar Vendida' : 'Marcar Disponible'}
                                        </button>
                                        <button class="table-btn delete" onclick="deleteObra('${obra.id}')">
                                            Eliminar
                                        </button>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;

            } catch (error) {
                console.error('Error:', error);
                container.innerHTML = '<p style="color: red;">Error al cargar las obras.</p>';
            }
        }

        // EDITAR OBRA
        async function editObra(id) {
            try {
                // Obtener datos de la obra
                const response = await fetch(`${SUPABASE_URL}/rest/v1/obras?id=eq.${id}&select=*`, {
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`
                    }
                });

                if (!response.ok) {
                    throw new Error('Error al cargar la obra');
                }

                const [obra] = await response.json();

                if (!obra) {
                    alert('Obra no encontrada');
                    return;
                }

                // Llenar formulario de edición
                document.getElementById('edit-id').value = obra.id;
                document.getElementById('edit-titulo').value = obra.titulo;
                document.getElementById('edit-artista').value = obra.artista;
                document.getElementById('edit-anio').value = obra.anio;
                document.getElementById('edit-tecnica').value = obra.tecnica;
                document.getElementById('edit-precio').value = obra.precio;

                // Mostrar modal
                document.getElementById('edit-modal-overlay').classList.add('active');

            } catch (error) {
                console.error('Error:', error);
                alert('Error al cargar los datos de la obra');
            }
        }

        function closeEditModal() {
            document.getElementById('edit-modal-overlay').classList.remove('active');
        }

        // Guardar cambios de edición
        document.getElementById('edit-artwork-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const submitBtn = e.target.querySelector('.submit-btn');
            submitBtn.disabled = true;
            submitBtn.textContent = 'GUARDANDO...';

            try {
                const id = document.getElementById('edit-id').value;
                const obraActualizada = {
                    titulo: document.getElementById('edit-titulo').value,
                    artista: document.getElementById('edit-artista').value,
                    anio: parseInt(document.getElementById('edit-anio').value),
                    tecnica: document.getElementById('edit-tecnica').value,
                    precio: parseFloat(document.getElementById('edit-precio').value)
                };

                const response = await fetch(`${SUPABASE_URL}/rest/v1/obras?id=eq.${id}`, {
                    method: 'PATCH',
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(obraActualizada)
                });

                if (!response.ok) {
                    throw new Error('Error al actualizar la obra');
                }

                alert('Obra actualizada exitosamente');
                closeEditModal();
                loadObras();

            } catch (error) {
                console.error('Error:', error);
                alert('Error al actualizar la obra: ' + error.message);
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'GUARDAR CAMBIOS';
            }
        });

        // CAMBIAR DISPONIBILIDAD
        async function toggleDisponibilidad(id, disponible) {
            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/obras?id=eq.${id}`, {
                    method: 'PATCH',
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ disponible })
                });

                if (!response.ok) {
                    throw new Error('Error al actualizar la obra');
                }

                loadObras();
            } catch (error) {
                console.error('Error:', error);
                alert('Error al actualizar la obra');
            }
        }

        // ELIMINAR OBRA
        async function deleteObra(id) {
            if (!confirm('¿Estás seguro de eliminar esta obra?')) {
                return;
            }

            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/obras?id=eq.${id}`, {
                    method: 'DELETE',
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`
                    }
                });

                if (!response.ok) {
                    throw new Error('Error al eliminar la obra');
                }

                alert('Obra eliminada exitosamente');
                loadObras();
            } catch (error) {
                console.error('Error:', error);
                alert('Error al eliminar la obra');
            }
        }

        function formatPrice(price) {
            return parseFloat(price).toLocaleString('es-CL', {
                minimumFractionDigits: 0,
                maximumFractionDigits: 0
            });
        }

        // Mobile menu
        const mobileMenuToggle = document.getElementById('mobile-menu-toggle');
        const mobileMenuClose = document.getElementById('mobile-menu-close');
        const navbarMenu = document.getElementById('navbar-menu');
        const menuOverlay = document.getElementById('menu-overlay');

        function openMobileMenu() {
            navbarMenu.classList.add('active');
            menuOverlay.classList.add('active');
        }

        function closeMobileMenu() {
            navbarMenu.classList.remove('active');
            menuOverlay.classList.remove('active');
        }

        mobileMenuToggle.addEventListener('click', openMobileMenu);
        mobileMenuClose.addEventListener('click', closeMobileMenu);
        menuOverlay.addEventListener('click', closeMobileMenu);

        // Cerrar menú al hacer click en un link
        document.querySelectorAll('.navbar-menu a').forEach(link => {
            link.addEventListener('click', closeMobileMenu);
        });

        // Verificar autenticación al cargar
        checkAuth();
    </script>
</body>
</html>
